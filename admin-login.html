<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | MegaPrep CMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="auth-page auth-page--admin">
      <section class="auth-panel auth-panel--intro">
        <a class="back-link" href="index.html">← Back to dashboard</a>
        <div class="brand brand--light">
          <div class="logo-mark" aria-hidden="true"><span>M</span></div>
          <div class="brand-copy">
            <span class="brand-name">MegaPrep</span>
            <span class="brand-tag brand-tag--light">CMS Admin</span>
          </div>
        </div>

        <div class="auth-hero-copy">
          <p class="eyebrow eyebrow--light">Admin access</p>
          <h1>Sign in to the admin workspace.</h1>
          <p class="auth-intro-copy auth-intro-copy--light">
            Clean access for managing exams and platform settings.
          </p>
        </div>
      </section>

      <section class="auth-panel auth-panel--form">
        <div class="auth-card">
          <div class="auth-card-top auth-card-top--compact">
            <div>
              <p class="form-kicker">Admin login</p>
              <h2>Sign in</h2>
            </div>
          </div>

          <form id="adminLoginForm" class="auth-form">
            <label>
              Work email
              <input type="email" placeholder="Enter work email" />
            </label>
            <label>
              Password
              <input type="password" placeholder="Enter password" />
              <input id="adminEmail" name="email" type="email" placeholder="Enter work email" />
            </label>
            <label>
              Password
              <input id="adminPassword" name="password" type="password" placeholder="Enter password" />
            </label>

            <div class="form-row">
              <label class="checkbox-row">
                <input type="checkbox" checked />
                <span>Keep me signed in</span>
              </label>
              <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="submit-button">Login to Dashboard</button>
          </form>

          <p class="switch-copy switch-copy--simple">
            Need a new admin account?
            <a href="admin-signup.html">Create admin profile</a>
          </p>
        </div>
      </section>
    </main>
      <script src="firebase-config.js"></script>
      <script src="auth.js"></script>
  </body>
</html>
