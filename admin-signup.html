<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Sign Up | MegaPrep CMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="auth-page auth-page--admin auth-page--signup">
      <section class="auth-panel auth-panel--intro">
        <a class="back-link" href="index.html">← Back to dashboard</a>
        <div class="brand brand--light">
          <div class="logo-mark" aria-hidden="true"><span>M</span></div>
          <div class="brand-copy">
            <span class="brand-name">MegaPrep</span>
            <span class="brand-tag brand-tag--light">CMS Admin</span>
          </div>
        </div>

        <div class="auth-hero-copy">
          <p class="eyebrow eyebrow--light">Admin setup</p>
          <h1>Create a new admin account.</h1>
          <p class="auth-intro-copy auth-intro-copy--light">
            Register a workspace profile for platform management.
          </p>
        </div>
      </section>

      <section class="auth-panel auth-panel--form">
        <div class="auth-card">
          <div class="auth-card-top auth-card-top--compact">
            <div>
              <p class="form-kicker">Admin sign up</p>
              <h2>Create admin account</h2>
            </div>
          </div>

          <form class="auth-form auth-form--two-col">
            <label>
              Full name
              <input type="text" placeholder="Enter full name" />
            </label>
            <label>
              Department
              <input type="text" placeholder="Enter department" />
            </label>
            <label>
              Work email
              <input type="email" placeholder="Enter work email" />
            </label>
            <label>
              Phone number
              <input type="tel" placeholder="Enter phone number" />
            </label>
            <label>
              Password
              <input type="password" placeholder="Create password" />
            </label>
            <label>
              Confirm password
              <input type="password" placeholder="Confirm password" />
            </label>
            <label class="full-span checkbox-row checkbox-card">
              <input type="checkbox" checked />
              <span>I agree to the platform terms and privacy policy.</span>
            </label>
            <button type="submit" class="submit-button full-span">Create Admin Account</button>
          </form>

          <p class="switch-copy switch-copy--simple">
            Already have an admin account?
            <a href="admin-login.html">Login here</a>
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
