<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Password Management | MegaPrep CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body data-page="passwords">
<div class="page-shell">
<header class="topbar topbar--dashboard">
<div class="topbar-glow" aria-hidden="true">
</div>
<div class="brand brand--dashboard">
<div class="logo-mark logo-mark--3d" aria-hidden="true">
<span>M</span>
</div>
<div class="brand-copy brand-copy--stacked">
<span class="brand-name">MegaPrep</span>
<span class="brand-tag">Password Management</span>
</div>
</div>
<div class="topbar-actions topbar-actions--dashboard">
<button class="topbar-button topbar-button--ghost" id="themeToggle" type="button">Toggle Theme</button>
<a class="topbar-button topbar-button--ghost" href="index.html">Dashboard</a>
<a class="topbar-button topbar-button--solid" href="devices.html">Devices</a>
</div>
</header>
<main class="content-area app-layout">
<section class="workspace-shell">
<div class="workspace-toolbar">
<div>
<p class="section-heading__eyebrow">Security</p>
<h2>Password Management</h2>
</div>
</div>
<div class="panel-card panel-card--narrow">
<div class="panel-card__header">
<h3>Update Password</h3>
<p>Change the saved admin password for the local workspace.</p>
</div>
<form id="passwordForm" class="app-form app-form--single">
<label>Current Password<input id="currentPassword" type="password" placeholder="Current password" />
</label>
<label>New Password<input id="newPassword" type="password" placeholder="New password" />
</label>
<label>Confirm Password<input id="confirmPassword" type="password" placeholder="Confirm new password" />
</label>
<div class="app-form__actions">
<button class="submit-button" type="submit">Update Password</button>
</div>
</form>
</div>
</section>
</main>
</div>
<div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="true">
</div>
<script src="curriculum.js">
</script>
<script src="app.js">
</script>
</body>
</html>
