<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solution Download | MegaPrep CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body data-page="solution-download">
<div class="page-shell">
  <header class="topbar topbar--dashboard">
    <div class="brand brand--dashboard">
      <div class="logo-mark logo-mark--3d" aria-hidden="true"><span>M</span></div>
      <div class="brand-copy brand-copy--stacked">
        <span class="brand-name">MegaPrep</span>
        <span class="brand-tag">Solution Download</span>
      </div>
    </div>
  </header>
  <main class="content-area app-layout">
    <section class="workspace-shell" style="max-width:720px;margin:auto;">
      <div class="panel-card">
        <div class="panel-card__header">
          <h3>Exam Solution</h3>
          <p>Scan QR থেকে এই পেইজ ওপেন হবে। এখানে solution paper download করা যাবে।</p>
        </div>
        <div id="solutionDownloadPage" class="preview-surface preview-surface--small"></div>
        <div class="entity-actions" style="margin-top:12px;">
          <button id="downloadSolutionBtn" type="button" class="submit-button">Download Solution PDF</button>
        </div>
      </div>
    </section>
  </main>
</div>
<div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>
<script src="curriculum.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
